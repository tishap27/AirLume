[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Point to your existing C code
build_flags = 
    -I../c_src
    -DESP32_BUILD
    -std=c11
    -Wno-format
    
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    bodmer/TFT_eSPI@^2.5.43 

# Don't auto-include main.c (we'll handle it manually)
build_src_filter = 
    +<*>