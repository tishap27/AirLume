<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://xmlns.jcp.org/jsf/passthrough">

<h:head>
<title>AirLume Lightning Prediction System</title>

<style>

/* ===== GLOBAL ===== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #020617;
    color: #e2e8f0;
    min-height: 100vh;
    position: relative;
}

/* ===== BACKGROUND LAYERS (FORCED NON-INTERACTIVE) ===== */

body::before,
.storm-clouds,
.atmosphere-grid,
.flight-paths,
.aircraft-layer {
    pointer-events: none !important;
    z-index: 0 !important;
}

/* ===== UI MUST ALWAYS BE ABOVE ===== */

.header,
.container,
.form-section,
.results-section {
    position: relative;
    z-index: 50;
}

/* ===== HEADER ===== */

.header {
    background: rgba(15, 23, 42, 0.88);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 2px solid rgba(56, 189, 248, 0.35);
}

.logo-img {
    height: 64px;
}

.header-title {
    font-size: 2em;
    font-weight: bold;
}

.header-subtitle {
    font-size: 0.9em;
    color: #94a3b8;
}

/* ===== CONTAINER ===== */

.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

/* ===== FORM ===== */

.form-section {
    background: rgba(15, 23, 42, 0.9);
    padding: 30px;
    border-radius: 16px;
    border: 1px solid rgba(56, 189, 248, 0.25);
}

.input-field {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #38bdf8;
    background: #020617;
    color: white;
}

.btn {
    background: linear-gradient(135deg, #38bdf8, #0284c7);
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    color: white;
    cursor: pointer;
    margin-top: 12px;
}

.btn:hover {
    filter: brightness(1.2);
}

table {
    width: 100%;
}

td {
    padding: 10px;
}

</style>
</h:head>

<h:body>

<!-- HEADER -->
<div class="header">

<h:graphicImage name="logo.png"
                library="images"
                styleClass="logo-img"/>

<div>
    <div class="header-title">AirLume Lightning Prediction</div>
    <div class="header-subtitle">
        Physics-Based Aircraft Lightning Strike Risk Analysis
    </div>
</div>

</div>

<div class="container">

<div class="form-section">

<h2>Flight Route Analysis</h2>

<h:form>

<table>

<tr>
<td>Origin Airport</td>
<td>
<h:inputText value="#{flightController.origin}"
             styleClass="input-field"
             p:placeholder="CYOW"
             required="true"/>
</td>
</tr>

<tr>
<td>Destination Airport</td>
<td>
<h:inputText value="#{flightController.destination}"
             styleClass="input-field"
             p:placeholder="CYYZ"
             required="true"/>
</td>
</tr>

<tr>
<td>Flight Level</td>
<td>
<h:selectOneMenu value="#{flightController.flightLevel}"
                 styleClass="input-field">
<f:selectItem itemValue="0" itemLabel="Ground"/>
<f:selectItem itemValue="200" itemLabel="FL200"/>
<f:selectItem itemValue="300" itemLabel="FL300"/>
<f:selectItem itemValue="350" itemLabel="FL350"/>
<f:selectItem itemValue="400" itemLabel="FL400"/>
</h:selectOneMenu>
</td>
</tr>

<tr>
<td colspan="2">

<h:commandButton value="Analyze Lightning Risk"
                 action="#{flightController.analyzeRoute}"
                 styleClass="btn"/>

<h:button value="Visualize Route"
          outcome="route-visualization"
          styleClass="btn"
          style="margin-left:10px; background: purple"/>

</td>
</tr>

</table>

</h:form>

</div>
</div>

</h:body>
</html>
